<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="../manifest.json">
    <title>Focus Mode</title>
     <link rel="stylesheet" href="../cssStyles/focusmode.css">
</head>
<body>
    <div class="focus-mode">
        <a href="productive.html" class="back-btn danger">x</a>
        <div class="pomodoro-time-face" id="pomodoro-timer">15:00</div>
        <div class="pomodoro-settings-buttons">
            <button id="pomodoro-type-selection">⏱︎</button>
            <button id="pomodoro-pause-start">▶︎</button>
            <button id="pomodoro-restart">↻</button>
        </div>
        <div class="control-buttons">
            <button id="taskButton">your tasks</button>
        </div>
        <div class="pomodoro-task-list">
            <h3>Your Pomodoro Tasks</h3>
            <ul id="pomodoroTaskList"></ul>
        </div>
        <div id="taskModal" class="modal hidden">
            <div class="modal-content">
                <h2>Select Tasks</h2>
                <ul id="firebaseTaskList"></ul>
                <button id="closeTaskModal">Close</button>
            </div>
        </div>    
    </div>
    <div id="selectionModal" class="modal hidden">
        <div class="modal-content">
            <h1>Set Pomodoro Session Length</h1>
            <div class="pomodoro-custom-inputs">
                <input type="number" id="focusInput" placeholder="Minutes to Focus" min="0">
                <input type="number" id="breakInput" placeholder="Minutes for Break" min="0">
            </div>
            <div class="pomdoro-selection-buttons">
                <button id="short-pomodoro-setting" title="15 minutes of focusing, and 5 minutes of break!">short</button>
                <button id="med-pomodoro-setting" title="30 minutes of focusing, and 5 minutes of break!">med</button>
                <button id="long-pomodoro-setting" title="45 miuntes of focusing, and 5 minutes of break!">long</button>
            </div>
            <button id="closeSelectionModal">X</button>
        </div>
    </div>
    
    <script type="module" src="../jsFiles/focusmode.js"></script>
</body>
</html>
